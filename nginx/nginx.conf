# Reverse proxy: single public origin for the SPA, REST API, and WebSocket.
# This avoids CORS complexity and mirrors a real production edge.

upstream backend_api {
    server backend:8000;
}

upstream frontend_app {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 15M;  # allow file uploads up to ~15MB

    # ---- REST API ----
    location /api/ {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- WebSocket ----
    location /ws {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;  # keep long-lived sockets open
    }

    # ---- Angular SPA ----
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
    }
}
