services:
  db:
    image: postgres:16-alpine
    container_name: chat_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatpass}
      POSTGRES_DB: ${POSTGRES_DB:-chatdb}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatuser} -d ${POSTGRES_DB:-chatdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - chat-net

  backend:
    build:
      context: ./backend
    container_name: chat_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
    volumes:
      - uploads-data:/app/uploads
      # Persist auto-generated Alembic migrations on the host so they survive
      # image rebuilds and stay consistent with the database revision.
      - ./backend/alembic/versions:/app/alembic/versions
    depends_on:
      db:
        condition: service_healthy
    networks:
      - chat-net

  frontend:
    build:
      context: ./frontend
    container_name: chat_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - chat-net

  nginx:
    image: nginx:1.27-alpine
    container_name: chat_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - chat-net

  # Free, open-source local LLM server powering the AI assistant.
  ollama:
    image: ollama/ollama:latest
    container_name: chat_ollama
    restart: unless-stopped
    environment:
      # Trust the host's corporate root CAs so model pulls work behind a
      # TLS-intercepting proxy.
      SSL_CERT_FILE: /usr/local/share/ca-certificates/corp-ca-bundle.crt
    volumes:
      - ollama-data:/root/.ollama
      - ./certs/corp-ca-bundle.pem:/usr/local/share/ca-certificates/corp-ca-bundle.crt:ro
    networks:
      - chat-net

  # One-shot: pulls the chat model on startup, then exits.
  ollama-pull:
    image: ollama/ollama:latest
    container_name: chat_ollama_pull
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        echo 'Waiting for Ollama...';
        until ollama list >/dev/null 2>&1; do sleep 2; done;
        echo 'Pulling ${OLLAMA_MODEL:-llama3.2:1b}...';
        ollama pull ${OLLAMA_MODEL:-llama3.2:1b};
        echo 'Model ready.'
    restart: "no"
    networks:
      - chat-net

volumes:
  postgres-data:
  uploads-data:
  ollama-data:

networks:
  chat-net:
    driver: bridge
