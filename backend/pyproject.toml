[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "C4", "SIM"]
# Intentional, idiomatic choices:
# - N802: DATABASE_URL is a settings-style constant exposed as a property.
# - N818: AppException is the conventional base-name for our exception hierarchy.
# - UP046/UP047: keep classic Generic[...] for Pydantic v2 generic compatibility.
# - UP042: (str, Enum) is kept for stable SQLAlchemy/Pydantic enum behavior.
# - B008: FastAPI uses function calls (Depends) in argument defaults by design.
ignore = ["B008", "N802", "N818", "UP046", "UP047", "UP042"]

[tool.ruff.lint.per-file-ignores]
"alembic/*" = ["E501"]
"tests/*" = ["S101"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
plugins = []
